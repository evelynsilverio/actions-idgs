name: Run Python Script

on: [push]

jobs:
  runs-python-script:
    runs-on: ubuntu-latest

    steps:
      - name: Inicio
        run: echo "Comienza Action"

      - name: Clona Repo
        uses: actions/checkout@v4

      - name: Muestra archivos
        run: ls -al

      - name: Ejecuta Script
        run: python app.py